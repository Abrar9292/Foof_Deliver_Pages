<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - FoodExpress</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="preloader">
        <div class="loader"></div>
    </div>

    <div id="toastBox"></div>

    <button id="themeToggle" class="theme-toggle">
        <i class="fa-solid fa-moon"></i>
    </button>

    <button id="backToTop" class="back-top-btn">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <nav class="navbar navbar-expand-lg fixed-top premium-navbar">
        <div class="container">
            <a class="navbar-brand brand-logo" href="index.html">
                <div class="logo-box"><i class="fa-solid fa-burger"></i></div>
                <span>FoodExpress</span>
            </a>

            <button class="navbar-toggler menu-btn" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="foodmenu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="restaurant.html">Restaurants</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cart.html">Cart</a></li>
                    <li class="nav-item"><a class="nav-link" href="checkout.html">Checkout</a></li>
                </ul>

                <a href="cart.html" class="nav-icon cart-icon">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="food-cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <div class="container text-center">
            <span class="section-badge">Your Cart</span>
            <h1>Food Cart</h1>
            <p>Review your selected food items.</p>
        </div>
    </section>

    <section class="food-cart-section py-5">
        <div class="container">
            <div class="row g-4">

                <div class="col-lg-8">
                    <div class="food-cart-box">
                        <h3 class="mb-4">Cart Items</h3>
                        <div id="foodCartItems"></div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="food-cart-summary">
                        <h3>Order Summary</h3>

                        <div class="summary-row">
                            <span>Total Items</span>
                            <strong id="foodTotalItems">0</strong>
                        </div>

                        <div class="summary-row">
                            <span>Subtotal</span>
                            <strong id="foodSubtotal">₹0</strong>
                        </div>

                        <div class="summary-row">
                            <span>Delivery</span>
                            <strong>₹49</strong>
                        </div>

                        <hr>

                        <div class="summary-row total">
                            <span>Total</span>
                            <strong id="foodGrandTotal">₹0</strong>
                        </div>

                        <a href="checkout.html" class="food-checkout-btn">Proceed To Checkout</a>
                        <button class="food-clear-btn" id="clearFoodCart">Clear Cart</button>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>

</html>
